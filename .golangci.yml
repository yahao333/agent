# golangci-lint v1.62+ 配置
# 单人 + 刚起步，启用"严格但不烦人"的一组 linter

run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    # 默认必开
    - errcheck         # 未处理的 error
    - gosimple         # 简化建议
    - govet            # 标准 vet
    - ineffassign      # 无效赋值
    - staticcheck      # 静态分析
    - unused           # 未使用的变量/函数

    # 强烈推荐
    - gofmt            # 格式
    - goimports        # import 整理
    - misspell         # 拼写
    - revive           # 替代 golint
    - gocritic         # 代码质量
    - bodyclose        # http body 必须关闭
    - errorlint        # errors.Is / errors.As 检查
    - nilerr           # return nil 但是有 err
    - prealloc         # slice 预分配
    - unconvert        # 多余类型转换

    # 安全
    - gosec            # 安全漏洞检测（硬编码密钥、弱加密、不安全 exec 等）

    # AI 协作场景特别有用
    - dupl             # 重复代码（AI 容易产出重复）
    - gocyclo          # 圈复杂度（AI 容易写超长函数）
    - funlen           # 函数长度

linters-settings:
  gocyclo:
    min-complexity: 15
  funlen:
    lines: 80
    statements: 50
  dupl:
    threshold: 100
  misspell:
    locale: US

issues:
  exclude-rules:
    # os.Exit 前手动调 stop() 清理信号：defer 不会执行，这是预期行为
    - path: cmd/ralph/main\.go
      linters:
        - gocritic
      text: "exitAfterDefer"
    # 测试文件放宽
    - path: _test\.go
      linters:
        - funlen
        - dupl
        - gocyclo
  max-issues-per-linter: 0
  max-same-issues: 0
